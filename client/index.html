<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e1c1a" />
    <meta
      name="description"
      content="Tableaux — an interactive wedding seating planner. Import your guest list, build a to-scale room, and assign guests by drag and drop."
    />
    <!-- Canonical/social URLs are stamped with the deploy origin at build time. -->
    <link rel="canonical" href="__PUBLIC_URL__/" />

    <!-- Open Graph (social link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tableaux" />
    <meta property="og:title" content="Tableaux — Wedding Seating Planner" />
    <meta
      property="og:description"
      content="Import your guest list, build a to-scale room, and assign guests by drag and drop."
    />
    <meta property="og:url" content="__PUBLIC_URL__/" />
    <meta property="og:image" content="__PUBLIC_URL__/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tableaux — Wedding Seating Planner" />
    <meta
      name="twitter:description"
      content="Import your guest list, build a to-scale room, and assign guests by drag and drop."
    />
    <meta name="twitter:image" content="__PUBLIC_URL__/og-image.png" />

    <!-- Fonts: Inter (UI) + Cormorant Garamond (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>Tableaux — Wedding Seating Planner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
